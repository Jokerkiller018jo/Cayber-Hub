<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Hub v11.0 | DNA Background</title>
    <style>
        @keyframes rgb-text {
            0% { color: #ff00ff; text-shadow: 0 0 10px #ff00ff; }
            33% { color: #00ffff; text-shadow: 0 0 10px #00ffff; }
            66% { color: #ffff00; text-shadow: 0 0 10px #ffff00; }
            100% { color: #ff00ff; text-shadow: 0 0 10px #ff00ff; }
        }

        :root { --magenta: #ff00ff; --cyan: #00ffff; --dark: #050505; --card: #121212; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* DNA BACKGROUND CANVAS */
        #dnaCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0; /* Behind all content */
            background: #0a0a0a; /* Fallback for no canvas */
        }

        /* All content should be above the canvas */
        .page { 
            position: absolute; 
            top: 0; left: 0;
            width: 100%; height: 100%; 
            display: none; 
            flex-direction: column; 
            z-index: 1; /* Above canvas */
            opacity: 0; 
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .active-page { 
            display: flex; 
            opacity: 1; 
            z-index: 10; 
            pointer-events: auto;
        }

        /* HEADER */
        .navbar { height: 60px; background: rgba(0,0,0,0.8); display: flex; align-items: center; padding: 0 25px; border-bottom: 1px solid #222; justify-content: space-between; position: relative; z-index: 11; }
        .logo { font-size: 1.5rem; font-weight: 900; animation: rgb-text 4s infinite linear; letter-spacing: 3px; }

        .lobby { flex: 1; padding: 30px; overflow-y: auto; background: rgba(0,0,0,0.6); position: relative; z-index: 10; }

        /* MARKET SECTION */
        .market-wrap { background: rgba(18,18,18,0.9); border: 1px solid #222; border-radius: 12px; padding: 20px; margin-bottom: 25px; }
        .market-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-top: 15px; }
        .m-card { background: rgba(0,0,0,0.7); border: 1px solid #333; padding: 12px; border-radius: 8px; text-align: center; }
        .m-card span { display: block; font-size: 0.65rem; color: #777; text-transform: uppercase; margin-bottom: 5px; }
        .m-card b { color: var(--cyan); font-size: 1rem; }

        .lbp-box { background: rgba(26,26,26,0.9); border: 1px solid var(--magenta); padding: 15px; border-radius: 10px; margin-top: 20px; display: flex; align-items: center; gap: 15px; }
        .lbp-box input { background: #000; border: 1px solid #444; color: var(--cyan); padding: 8px; width: 80px; border-radius: 5px; outline: none; font-weight: bold; }

        /* TERMINAL APP */
        .terminal-wrap { display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px; box-sizing: border-box; position: relative; z-index: 10; }
        .terminal { width: 100%; max-width: 1000px; height: 85vh; background: rgba(0,0,0,0.95); border: 1px solid var(--magenta); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        .tabs { display: flex; background: rgba(17,17,17,0.9); padding: 8px; gap: 5px; overflow-x: auto; border-bottom: 1px solid #222; }
        .tab { padding: 6px 14px; background: rgba(34,34,34,0.9); font-size: 0.7rem; border-radius: 4px; cursor: pointer; white-space: nowrap; color: #888; }
        .tab.active { background: var(--magenta); color: black; font-weight: bold; }
        .back-btn { margin-left: auto; color: #ff4444; font-weight: bold; cursor: pointer; font-size: 0.75rem; padding: 5px 10px; border: 1px solid transparent; border-radius: 4px; }
        .back-btn:hover { border-color: #ff4444; background: rgba(255,0,0,0.1); }

        .search-area { padding: 10px; border-bottom: 1px solid #222; background: rgba(0,0,0,0.9); }
        .search-bar { width: 100%; padding: 10px; background: #0a0a0a; border: 1px solid #333; color: var(--magenta); border-radius: 5px; outline: none; box-sizing: border-box; }
        .content { flex: 1; overflow-y: auto; padding: 15px; background: rgba(0,0,0,0.8); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
        .item { background: rgba(15,15,15,0.9); border: 1px solid #222; padding: 12px; border-radius: 6px; text-align: center; cursor: pointer; transition: 0.1s; }
        .item:hover { border-color: var(--cyan); background: #151515; }

        #toast { position: fixed; bottom: -50px; left: 50%; transform: translateX(-50%); background: var(--cyan); color: #000; padding: 10px 25px; border-radius: 5px; font-weight: bold; transition: 0.3s; z-index: 3000; }
        .show { bottom: 30px !important; }
    </style>
</head>
<body>

<canvas id="dnaCanvas"></canvas>

<div id="home-page" class="page active-page">
    <div class="navbar"><div class="logo">CYBER-HUB</div><div style="font-size:0.7rem; color:#444;">V11.0-DNA</div></div>
    <div class="lobby">
        <div class="market-wrap">
            <h3 style="margin:0 0 15px 0; font-size:0.9rem; color:var(--magenta)">LIVE MARKET CATEGORY</h3>
            <div class="market-grid">
                <div class="m-card"><span>Petrol</span><b>$84.10</b></div>
                <div class="m-card"><span>Gold</span><b>$2,341</b></div>
                <div class="m-card"><span>Silver</span><b>$28.50</b></div>
                <div class="m-card"><span>Bitcoin</span><b>$71,200</b></div>
                <div class="m-card"><span>Diamond</span><b>$4,200</b></div>
            </div>
            <div class="lbp-box">
                <span style="font-size:0.7rem; color:#888;">CONVERT USD TO LBP:</span>
                <input type="number" id="usd-in" value="130" oninput="doLBP()">
                <span style="color:var(--magenta)">➔</span>
                <b id="lbp-out" style="font-size:1.1rem;">0 LBP</b>
            </div>
        </div>

        <div style="margin-bottom:15px; font-size:0.8rem; color:#555;">APPLICATIONS</div>
        <div class="app-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px;">
            <div onclick="openPage('term-page')" style="background:rgba(18,18,18,0.9); border:1px solid #222; border-radius:10px; cursor:pointer; text-align:center; padding:20px;">
                <div style="font-size:2.5rem;">🌍</div>
                <div style="font-weight:bold; margin-top:10px;">Global Vault</div>
            </div>
        </div>
    </div>
</div>

<div id="term-page" class="page">
    <div class="terminal-wrap">
        <div class="terminal">
            <div class="tabs">
                <div class="tab active" onclick="setTab('ALL', this)">ALL</div>
                <div class="tab" onclick="setTab('MAJOR', this)">MAJOR</div>
                <div class="tab" onclick="setTab('AMERICAS', this)">AMERICAS</div>
                <div class="tab" onclick="setTab('EUROPE', this)">EUROPE</div>
                <div class="tab" onclick="setTab('MID-EAST', this)">MID-EAST</div>
                <div class="tab" onclick="setTab('ASIA', this)">ASIA</div>
                <div class="tab" onclick="setTab('AFRICA', this)">AFRICA</div>
                <div class="tab" onclick="setTab('OCEANIA', this)">OCEANIA</div>
                <div class="tab" onclick="setTab('CRYPTO', this)">CRYPTO</div>
                <div class="back-btn" onclick="openPage('home-page')">EXIT ✖</div>
            </div>
            <div class="search-area"><input type="text" id="srch" class="search-bar" placeholder="Search 150+ Currencies..."></div>
            <div class="content"><div id="grid" class="grid"></div></div>
        </div>
    </div>
</div>

<div id="toast">COPIED</div>

<script>
    const db = [
        // MAJOR
        {n:'USD', s:'$', c:'MAJOR'}, {n:'EUR', s:'€', c:'MAJOR'}, {n:'GBP', s:'£', c:'MAJOR'}, {n:'JPY', s:'¥', c:'MAJOR'}, {n:'CHF', s:'Fr', c:'MAJOR'}, {n:'CAD', s:'$', c:'MAJOR'}, {n:'AUD', s:'$', c:'MAJOR'}, {n:'NZD', s:'$', c:'MAJOR'},
        // AMERICAS
        {n:'ARS', s:'$', c:'AMERICAS'}, {n:'BOB', s:'Bs', c:'AMERICAS'}, {n:'BRL', s:'R$', c:'AMERICAS'}, {n:'CLP', s:'$', c:'AMERICAS'}, {n:'COP', s:'$', c:'AMERICAS'}, {n:'CRC', s:'₡', c:'AMERICAS'}, {n:'CUP', s:'$', c:'AMERICAS'}, {n:'DOP', s:'$', c:'AMERICAS'}, {n:'GTQ', s:'Q', c:'AMERICAS'}, {n:'HNL', s:'L', c:'AMERICAS'}, {n:'JMD', s:'$', c:'AMERICAS'}, {n:'MXN', s:'$', c:'AMERICAS'}, {n:'NIO', s:'C$', c:'AMERICAS'}, {n:'PAB', s:'B/.', c:'AMERICAS'}, {n:'PEN', s:'S/', c:'AMERICAS'}, {n:'PYG', s:'₲', c:'AMERICAS'}, {n:'UYU', s:'$', c:'AMERICAS'}, {n:'VES', s:'Bs', c:'AMERICAS'},
        // EUROPE
        {n:'ALL', s:'L', c:'EUROPE'}, {n:'BAM', s:'KM', c:'EUROPE'}, {n:'BGN', s:'лв', c:'EUROPE'}, {n:'CZK', s:'Kč', c:'EUROPE'}, {n:'DKK', s:'kr', c:'EUROPE'}, {n:'GEL', s:'₾', c:'EUROPE'}, {n:'HUF', s:'Ft', c:'EUROPE'}, {n:'ISK', s:'kr', c:'EUROPE'}, {n:'MDL', s:'L', c:'EUROPE'}, {n:'MKD', s:'den', c:'EUROPE'}, {n:'NOK', s:'kr', c:'EUROPE'}, {n:'PLN', s:'zł', c:'EUROPE'}, {n:'RON', s:'lei', c:'EUROPE'}, {n:'RSD', s:'din', c:'EUROPE'}, {n:'SEK', s:'kr', c:'EUROPE'}, {n:'TRY', s:'₺', c:'EUROPE'}, {n:'UAH', s:'₴', c:'EUROPE'},
        // MIDDLE EAST
        {n:'AED', s:'د.إ', c:'MID-EAST'}, {n:'BHD', s:'.د.ب', c:'MID-EAST'}, {n:'EGP', s:'£', c:'MID-EAST'}, {n:'ILS', s:'₪', c:'MID-EAST'}, {n:'IQD', s:'ع.د', c:'MID-EAST'}, {n:'IRR', s:'﷼', c:'MID-EAST'}, {n:'JOD', s:'د.ا', c:'MID-EAST'}, {n:'KWD', s:'د.ك', c:'MID-EAST'}, {n:'LBP', s:'ل.ل', c:'MID-EAST'}, {n:'OMR', s:'﷼', c:'MID-EAST'}, {n:'QAR', s:'﷼', c:'MID-EAST'}, {n:'SAR', s:'﷼', c:'MID-EAST'}, {n:'SYP', s:'£', c:'MID-EAST'}, {n:'YER', s:'﷼', c:'MID-EAST'},
        // ASIA
        {n:'AFN', s:'؋', c:'ASIA'}, {n:'BDT', s:'৳', c:'ASIA'}, {n:'BND', s:'$', c:'ASIA'}, {n:'CNY', s:'¥', c:'ASIA'}, {n:'HKD', s:'$', c:'ASIA'}, {n:'IDR', s:'Rp', c:'ASIA'}, {n:'INR', s:'₹', c:'ASIA'}, {n:'KHR', s:'៛', c:'ASIA'}, {n:'KRW', s:'₩', c:'ASIA'}, {n:'KZT', s:'₸', c:'ASIA'}, {n:'LAK', s:'₭', c:'ASIA'}, {n:'LKR', s:'₨', c:'ASIA'}, {n:'MMK', s:'K', c:'ASIA'}, {n:'MNT', s:'₮', c:'ASIA'}, {n:'MYR', s:'RM', c:'ASIA'}, {n:'NPR', s:'₨', c:'ASIA'}, {n:'PHP', s:'₱', c:'ASIA'}, {n:'PKR', s:'₨', c:'ASIA'}, {n:'SGD', s:'$', c:'ASIA'}, {n:'THB', s:'฿', c:'ASIA'}, {n:'TWD', s:'$', c:'ASIA'}, {n:'UZS', s:'soʻm', c:'ASIA'}, {n:'VND', s:'₫', c:'ASIA'},
        // AFRICA
        {n:'DZD', s:'د.ج', c:'AFRICA'}, {n:'AOA', s:'Kz', c:'AFRICA'}, {n:'BWP', s:'P', c:'AFRICA'}, {n:'CDF', s:'Fr', c:'AFRICA'}, {n:'ETB', s:'Br', c:'AFRICA'}, {n:'GHS', s:'₵', c:'AFRICA'}, {n:'KES', s:'Sh', c:'AFRICA'}, {n:'MAD', s:'د.م.', c:'AFRICA'}, {n:'MUR', s:'₨', c:'AFRICA'}, {n:'NGN', s:'₦', c:'AFRICA'}, {n:'RWF', s:'Fr', c:'AFRICA'}, {n:'SDG', s:'£', c:'AFRICA'}, {n:'SOS', s:'Sh', c:'AFRICA'}, {n:'TND', s:'د.ت', c:'AFRICA'}, {n:'TZS', s:'Sh', c:'AFRICA'}, {n:'UGX', s:'Sh', c:'AFRICA'}, {n:'ZAR', s:'R', c:'AFRICA'}, {n:'ZMW', s:'ZK', c:'AFRICA'},
        // OCEANIA
        {n:'FJD', s:'$', c:'OCEANIA'}, {n:'PGK', s:'K', c:'OCEANIA'}, {n:'SBD', s:'$', c:'OCEANIA'}, {n:'TOP', s:'T$', c:'OCEANIA'}, {n:'VUV', s:'Vt', c:'OCEANIA'}, {n:'WST', s:'T', c:'OCEANIA'},
        // CRYPTO
        {n:'BTC', s:'₿', c:'CRYPTO'}, {n:'ETH', s:'Ξ', c:'CRYPTO'}, {n:'SOL', s:'◎', c:'CRYPTO'}, {n:'BNB', s:'🔶', c:'CRYPTO'}, {n:'XRP', s:'✕', c:'CRYPTO'}, {n:'USDT', s:'₮', c:'CRYPTO'}, {n:'TON', s:'💎', c:'CRYPTO'}, {n:'DOGE', s:'Ð', c:'CRYPTO'}
    ];

    let curTab = 'ALL';

    function doLBP() {
        const val = document.getElementById('usd-in').value;
        const rate = 89500;
        document.getElementById('lbp-out').innerText = (val * rate).toLocaleString() + " LBP";
    }

    function openPage(id) {
        document.querySelectorAll('.page').forEach(p => {
            p.classList.remove('active-page');
            setTimeout(() => { 
                if (!p.classList.contains('active-page')) p.style.display = 'none'; 
            }, 300);
        });
        const target = document.getElementById(id);
        target.style.display = 'flex';
        setTimeout(() => { 
            target.classList.add('active-page'); 
        }, 10);
    }

    function setTab(cat, el) {
        curTab = cat;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        render();
    }

    function render() {
        const q = document.getElementById('srch').value.toUpperCase();
        const g = document.getElementById('grid');
        g.innerHTML = '';
        db.filter(i => (curTab === 'ALL' || i.c === curTab) && i.n.includes(q)).forEach(i => {
            const d = document.createElement('div');
            d.className = 'item';
            d.innerHTML = `<b style="color:var(--magenta); font-size:1.2rem; display:block;">${i.s}</b><small style="color:#666">${i.n}</small>`;
            d.onclick = (e) => { 
                e.stopPropagation();
                navigator.clipboard.writeText(i.s); 
                showToast(i.s); 
            };
            g.appendChild(d);
        });
    }

    function showToast(s) {
        const t = document.getElementById('toast');
        t.innerText = "COPIED: " + s;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    document.getElementById('srch').addEventListener('input', render);
    render(); doLBP();


    // DNA BACKGROUND SCRIPT
    const canvas = document.getElementById('dnaCanvas');
    const ctx = canvas.getContext('2d');

    let particles = [];
    const numParticles = 80;
    const maxLineDistance = 150; // Max distance for lines
    const particleSpeed = 0.3;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = (Math.random() - 0.5) * particleSpeed;
            this.vy = (Math.random() - 0.5) * particleSpeed;
            this.radius = 1;
            this.color = 'rgba(255, 0, 255, 0.8)'; // Magenta
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;

            // Bounce off edges
            if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
        }
    }

    function createParticles() {
        for (let i = 0; i < numParticles; i++) {
            particles.push(new Particle());
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height); // Clear canvas

        for (let i = 0; i < particles.length; i++) {
            particles[i].update();
            particles[i].draw();

            // Draw lines between particles
            for (let j = i + 1; j < particles.length; j++) {
                const p1 = particles[i];
                const p2 = particles[j];
                const distance = Math.sqrt((p1.x - p2.x)**2 + (p1.y - p2.y)**2);

                if (distance < maxLineDistance) {
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.strokeStyle = `rgba(255, 0, 255, ${1 - (distance / maxLineDistance) * 0.7})`; // Fade lines
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }
            }
        }
        requestAnimationFrame(animate);
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    createParticles();
    animate();
</script>
</body>
</html>
